<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク投げ込み</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f2;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0dfd8;
    --accent: #5b4fcf;
    --accent2: #7c70e0;
    --red: #d94f4f;
    --amber: #c47d0e;
    --green: #1a8f5a;
    --text: #1a1a22;
    --muted: #888880;
    --font: 'Noto Sans JP', sans-serif;
    --mono: 'DM Mono', monospace;
    --r: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 80px;
  }

  header {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    letter-spacing: .08em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background .3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red); }

  .status-label {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  /* Settings panel */
  .settings-panel {
    width: 100%; max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 20px;
  }

  .settings-panel h3 {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent2);
    letter-spacing: .1em;
    margin-bottom: 14px;
  }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .field-row label {
    font-size: 12px;
    color: var(--muted);
  }

  input[type="text"], input[type="password"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }

  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }

  .toggle-settings {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    padding: 5px 12px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .toggle-settings:hover { color: var(--text); border-color: var(--accent); }

  /* Add task box */
  .add-box {
    width: 100%; max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px 20px;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .add-box:focus-within { border-color: var(--accent); }

  .task-input {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    width: 100%;
    outline: none;
    margin-bottom: 14px;
    caret-color: var(--accent);
  }
  .task-input::placeholder { color: var(--muted); }

  .add-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .priority-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    color: var(--text);
  }
  .priority-btn:hover { border-color: var(--accent); }
  .priority-btn.active-red { background: #fce8e8; border-color: var(--red); color: var(--red); }
  .priority-btn.active-amber { background: #fef3dc; border-color: var(--amber); color: var(--amber); }
  .priority-btn.active-green { background: #e0f5ec; border-color: var(--green); color: var(--green); }

  .cat-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 5px 12px;
    cursor: pointer;
    outline: none;
  }

  .deadline-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    outline: none;
    width: 138px;
  }
  .deadline-input:focus { border-color: var(--accent); color: var(--text); }

  .spacer { flex: 1; }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity .2s, transform .1s;
  }
  .btn-add:hover { opacity: .9; }
  .btn-add:active { transform: scale(.97); }
  .btn-add:disabled { opacity: .4; cursor: not-allowed; }

  /* Filters */
  .filters {
    width: 100%; max-width: 600px;
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    padding: 4px 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Task list */
  .task-list {
    width: 100%; max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color .2s, opacity .3s;
    animation: slideIn .2s ease;
  }
  .task-item:hover { border-color: var(--border); }
  .task-item:hover .task-actions { opacity: 1; }
  .task-item.done { opacity: .45; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    font-size: 12px;
    color: transparent;
  }
  .check-btn:hover { border-color: var(--green); color: var(--green); }
  .task-item.done .check-btn { background: var(--green); border-color: var(--green); color: #fff; }

  .task-body { flex: 1; }

  .task-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }

  .task-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    font-family: var(--mono);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .badge-red { background: #fce8e8; color: var(--red); }
  .badge-amber { background: #fef3dc; color: var(--amber); }
  .badge-green { background: #e0f5ec; color: var(--green); }
  .badge-cat { background: var(--surface2); color: var(--muted); }
  .badge-date { background: var(--surface2); color: var(--muted); font-size: 11px; }
  .badge-pending { background: #eeecfd; color: var(--accent2); font-size: 10px; }

  .task-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity .2s;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .2s;
    line-height: 1;
  }
  .del-btn:hover { color: var(--red); }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 40px 0;
    font-family: var(--mono);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.ok { border-color: var(--green); color: var(--green); }
  .toast.err { border-color: var(--red); color: var(--red); }

  /* Section label */
  .section-label {
    width: 100%; max-width: 600px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: .08em;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  @media (max-width: 480px) {
    .add-controls { gap: 6px; }
    .task-actions { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">// TASK INBOX</span>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="status-label"><span class="status-dot" id="dot"></span><span id="status-text">未接続</span></span>
    <button class="toggle-settings" onclick="toggleSettings()">⚙ 設定</button>
  </div>
</header>

<!-- Settings -->
<div class="settings-panel" id="settings-panel" style="display:none">
  <h3>// NOTION 接続設定</h3>
  <div class="field-row">
    <label>Integration Token（secret_...）</label>
    <input type="password" id="cfg-token" placeholder="secret_xxxxxxxxxxxx">
  </div>
  <div class="field-row">
    <label>タスクDB の Database ID</label>
    <input type="text" id="cfg-db" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
  </div>
  <div class="field-row">
    <label>カテゴリの選択肢（カンマ区切り）</label>
    <input type="text" id="cfg-cats" placeholder="GE, ANUN, 由貴さん, 将吾さん, 個人">
  </div>
  <div style="display:flex;gap:10px;align-items:center;margin-top:4px;">
    <button class="btn-save" onclick="saveSettings()">保存して接続テスト</button>
    <span id="cfg-msg" style="font-size:12px;color:var(--muted)"></span>
  </div>
  <p style="font-size:11px;color:var(--muted);margin-top:12px;line-height:1.6;">
    ※ 設定はブラウザのlocalStorageに保存されます。<br>
    ※ Notion IntegrationのTokenは <a href="https://www.notion.so/my-integrations" target="_blank" style="color:var(--accent2)">notion.so/my-integrations</a> で取得し、タスクDBに Integration を追加してください。
  </p>
</div>

<!-- Add task -->
<div class="add-box">
  <input class="task-input" id="task-input" placeholder="タスクを入力（Enterで追加）" autocomplete="off" autofocus>
  <div class="add-controls">
    <button class="priority-btn" id="p-red" onclick="setPriority('🔴')">🔴 今日中</button>
    <button class="priority-btn" id="p-amber" onclick="setPriority('🟡')">🟡 今週中</button>
    <button class="priority-btn" id="p-green" onclick="setPriority('🟢')">🟢 今月中</button>
    <select class="cat-select" id="cat-select">
      <option value="">カテゴリ</option>
    </select>
    <input type="date" class="deadline-input" id="deadline-input" title="締切日">
    <div class="spacer"></div>
    <button class="btn-add" onclick="addTask()" id="add-btn">
      <span>追加</span><span style="font-size:16px;line-height:1">↑</span>
    </button>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('🔴', this)">🔴 今日中</button>
  <button class="filter-btn" onclick="setFilter('🟡', this)">🟡 今週中</button>
  <button class="filter-btn" onclick="setFilter('🟢', this)">🟢 今月中</button>
  <button class="filter-btn" onclick="setFilter('done', this)">✓ 完了</button>
</div>

<div class="section-label" id="count-label"></div>
<div class="task-list" id="task-list"></div>

<div class="toast" id="toast"></div>

<script>
  const PROXY = 'https://api.anthropic.com/v1/messages'; // not used
  let cfg = {token:'', db:'', cats:['GE','ANUN','由貴さん','将吾さん','個人']};
  let tasks = [];
  let currentPriority = '🔴';
  let currentFilter = 'all';

  // ── Storage ──────────────────────────────────────────────
  function loadCfg() {
    try {
      const s = localStorage.getItem('task-inbox-cfg');
      if (s) cfg = {...cfg, ...JSON.parse(s)};
    } catch(e){}
    document.getElementById('cfg-token').value = cfg.token || '';
    document.getElementById('cfg-db').value = cfg.db || '';
    document.getElementById('cfg-cats').value = (cfg.cats||[]).join(', ');
    buildCatSelect();
    if (cfg.token && cfg.db) testConnection();
  }

  function saveSettings() {
    cfg.token = document.getElementById('cfg-token').value.trim();
    cfg.db = document.getElementById('cfg-db').value.trim().replace(/-/g,'');
    cfg.cats = document.getElementById('cfg-cats').value.split(',').map(s=>s.trim()).filter(Boolean);
    localStorage.setItem('task-inbox-cfg', JSON.stringify(cfg));
    buildCatSelect();
    document.getElementById('cfg-msg').textContent = '保存しました';
    testConnection();
  }

  function loadTasks() {
    try {
      tasks = JSON.parse(localStorage.getItem('task-inbox-tasks') || '[]');
    } catch(e){ tasks = []; }
  }

  function saveTasks() {
    localStorage.setItem('task-inbox-tasks', JSON.stringify(tasks));
  }

  // ── UI helpers ────────────────────────────────────────────
  function buildCatSelect() {
    const sel = document.getElementById('cat-select');
    const cur = sel.value;
    sel.innerHTML = '<option value="">カテゴリ</option>';
    (cfg.cats||[]).forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
    sel.value = cur;
  }

  function setPriority(p) {
    currentPriority = p;
    document.getElementById('p-red').className = 'priority-btn' + (p==='🔴'?' active-red':'');
    document.getElementById('p-amber').className = 'priority-btn' + (p==='🟡'?' active-amber':'');
    document.getElementById('p-green').className = 'priority-btn' + (p==='🟢'?' active-green':'');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function toggleSettings() {
    const p = document.getElementById('settings-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' '+type : '');
    setTimeout(()=>t.className='toast', 2200);
  }

  function setStatus(s) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('status-text');
    if (s==='ok') { dot.className='status-dot connected'; txt.textContent='Notion接続中'; }
    else if (s==='err') { dot.className='status-dot error'; txt.textContent='接続エラー'; }
    else { dot.className='status-dot'; txt.textContent='未接続'; }
  }

  // ── Notion API ────────────────────────────────────────────
  async function notionFetch(path, method, body) {
    const r = await fetch('https://api.notion.com/v1'+path, {
      method,
      headers: {
        'Authorization': 'Bearer '+cfg.token,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
  }

  async function testConnection() {
    if (!cfg.token || !cfg.db) return;
    try {
      const dbId = cfg.db.replace(/-/g,'').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
      const res = await notionFetch('/databases/'+dbId, 'GET');
      if (res.object === 'database') {
        setStatus('ok');
        document.getElementById('cfg-msg').textContent = '✓ 接続OK';
        await fetchFromNotion();
      } else {
        setStatus('err');
        document.getElementById('cfg-msg').textContent = res.message || '接続エラー';
      }
    } catch(e) {
      setStatus('err');
      document.getElementById('cfg-msg').textContent = 'エラー: '+e.message;
    }
  }

  // Notionからタスクを取得
  async function fetchFromNotion() {
    if (!cfg.token || !cfg.db) return;
    try {
      const dbId = formatDbId(cfg.db);
      const res = await notionFetch('/databases/'+dbId+'/query', 'POST', {
        page_size: 100,
        sorts: [{ property: '優先度', direction: 'ascending' }]
      });
      if (!res.results) return;

      // ローカルのpendingタスクはそのまま残す
      const pendingLocal = tasks.filter(t => t.syncStatus === 'pending');
      const notionTasks = res.results.map(page => {
        const props = page.properties;
        const name = props['タスク名']?.title?.[0]?.text?.content
          || props['名前']?.title?.[0]?.text?.content
          || props['Name']?.title?.[0]?.text?.content
          || '(タスク名なし)';
        const status = props['ステータス']?.status?.name
          || props['Status']?.status?.name
          || props['完了']?.checkbox ? '完了' : '未着手';
        const done = status === '完了' || props['完了']?.checkbox === true;
        const pRaw = props['優先度']?.select?.name || props['Priority']?.select?.name || '';
        const priority = pRaw.includes('🔴') ? '🔴' : pRaw.includes('🟡') ? '🟡' : pRaw.includes('🟢') ? '🟢' : '🟡';
        const cat = props['プロジェクト']?.select?.name || props['カテゴリ']?.select?.name || '';
        const dateRaw = props['期日']?.date?.start || props['締切']?.date?.start || props['Due']?.date?.start || '';
        return {
          id: page.id,
          name,
          priority,
          category: cat,
          deadline: dateRaw,
          done,
          syncStatus: 'synced',
          notionId: page.id
        };
      });

      tasks = [...notionTasks, ...pendingLocal.filter(p => !notionTasks.find(n=>n.id===p.id))];
      saveTasks();
      renderTasks();
    } catch(e) {
      console.error('fetch error', e);
    }
  }

  function formatDbId(id) {
    const clean = id.replace(/-/g,'');
    if (clean.length !== 32) return id;
    return clean.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
  }

  // Notionにタスクを追加
  async function pushToNotion(task) {
    const dbId = formatDbId(cfg.db);
    const props = {
      'タスク名': { title: [{ text: { content: task.name } }] }
    };

    // 優先度
    if (task.priority) {
      const label = task.priority === '🔴' ? '🔴 今日中' : task.priority === '🟡' ? '🟡 今週中' : '🟢 今月中';
      props['優先度'] = { select: { name: label } };
    }
    // カテゴリ
    if (task.category) {
      props['プロジェクト'] = { select: { name: task.category } };
      props['カテゴリ'] = { select: { name: task.category } };
    }
    // 期日
    if (task.deadline) {
      props['期日'] = { date: { start: task.deadline } };
      props['締切'] = { date: { start: task.deadline } };
    }

    const res = await notionFetch('/pages', 'POST', {
      parent: { database_id: dbId },
      properties: props
    });
    return res;
  }

  // Notionでステータスを完了に
  async function completeInNotion(notionId) {
    await notionFetch('/pages/'+notionId, 'PATCH', {
      properties: {
        'ステータス': { status: { name: '完了' } },
        '完了': { checkbox: true }
      }
    });
  }

  // ── Task operations ───────────────────────────────────────
  async function addTask() {
    const input = document.getElementById('task-input');
    const name = input.value.trim();
    if (!name) return;

    const task = {
      id: 'local-' + Date.now(),
      name,
      priority: currentPriority,
      category: document.getElementById('cat-select').value,
      deadline: document.getElementById('deadline-input').value,
      done: false,
      syncStatus: cfg.token ? 'pending' : 'local',
      notionId: null
    };

    tasks.unshift(task);
    saveTasks();
    renderTasks();

    input.value = '';
    document.getElementById('deadline-input').value = '';

    if (cfg.token && cfg.db) {
      try {
        const res = await pushToNotion(task);
        if (res.id) {
          task.notionId = res.id;
          task.id = res.id;
          task.syncStatus = 'synced';
          saveTasks();
          renderTasks();
          showToast('✓ Notionに追加しました', 'ok');
        } else {
          task.syncStatus = 'error';
          saveTasks();
          renderTasks();
          showToast('Notion追加エラー: ' + (res.message || ''), 'err');
        }
      } catch(e) {
        task.syncStatus = 'error';
        saveTasks();
        renderTasks();
        showToast('接続エラー', 'err');
      }
    } else {
      showToast('ローカルに追加（Notion未接続）');
    }
  }

  async function toggleDone(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    saveTasks();
    renderTasks();

    if (task.done && task.notionId && cfg.token) {
      try {
        await completeInNotion(task.notionId);
        showToast('✓ Notionで完了にしました', 'ok');
      } catch(e) {
        showToast('完了の同期に失敗しました', 'err');
      }
    }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  // ── Render ────────────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('task-list');
    let filtered = tasks.filter(t => {
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'all') return !t.done;
      return !t.done && t.priority === currentFilter;
    });

    const countLabel = document.getElementById('count-label');
    countLabel.textContent = filtered.length + ' 件';

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">タスクなし</div>';
      return;
    }

    list.innerHTML = filtered.map(task => {
      const pClass = task.priority === '🔴' ? 'badge-red' : task.priority === '🟡' ? 'badge-amber' : 'badge-green';
      const pLabel = task.priority === '🔴' ? '🔴 今日中' : task.priority === '🟡' ? '🟡 今週中' : '🟢 今月中';
      const syncBadge = task.syncStatus === 'pending' ? '<span class="badge badge-pending">同期中…</span>'
        : task.syncStatus === 'error' ? '<span class="badge" style="background:#fce8e8;color:var(--red);font-size:10px;">同期エラー</span>'
        : task.syncStatus === 'local' ? '<span class="badge" style="background:var(--surface2);color:var(--muted);font-size:10px;">ローカル</span>'
        : '';
      const dateBadge = task.deadline ? `<span class="badge badge-date">${task.deadline}</span>` : '';
      const catBadge = task.category ? `<span class="badge badge-cat">${task.category}</span>` : '';

      return `
      <div class="task-item${task.done?' done':''}" id="ti-${task.id}">
        <button class="check-btn" onclick="toggleDone('${task.id}')" title="完了にする">✓</button>
        <div class="task-body">
          <div class="task-name">${escHtml(task.name)}</div>
          <div class="task-meta">
            <span class="badge ${pClass}">${pLabel}</span>
            ${catBadge}${dateBadge}${syncBadge}
          </div>
        </div>
        <div class="task-actions">
          <button class="del-btn" onclick="deleteTask('${task.id}')" title="削除">×</button>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Keyboard shortcuts ────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id === 'task-input') {
      addTask();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === '1') { e.preventDefault(); setPriority('🔴'); }
    if ((e.metaKey || e.ctrlKey) && e.key === '2') { e.preventDefault(); setPriority('🟡'); }
    if ((e.metaKey || e.ctrlKey) && e.key === '3') { e.preventDefault(); setPriority('🟢'); }
  });

  // ── Init ──────────────────────────────────────────────────
  setPriority('🔴');
  loadCfg();
  loadTasks();
  renderTasks();

  // 30秒ごとにNotionから再取得
  setInterval(() => {
    if (cfg.token && cfg.db) fetchFromNotion();
  }, 30000);
</script>
</body>
</html>
